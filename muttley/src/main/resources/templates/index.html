<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muttley - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .login-card { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>

<main class="login-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h2 class="h3 mb-3 fw-normal">Portal do Aluno</h2>
                <p class="text-muted">Acesse seus certificados</p>
            </div>

            <form action="/login" method="POST">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="floatingInput" name="nome" placeholder="Seu nome">
                    <label for="floatingInput">Nome do Aluno</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="floatingPassword" name="id" placeholder="ID ou Senha">
                    <label for="floatingPassword">ID do Aluno</label>
                </div>

                <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
                
                <div class="mt-3 text-center">
                    <small class="text-muted">Muttley Project &copy; 2026</small>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
